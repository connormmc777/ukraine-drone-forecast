# Copy this to my-secrets.yaml and fill in real values.
# my-secrets.yaml is in .gitignore — NEVER commit it.
#
#   cp deploy/my-secrets.example.yaml deploy/my-secrets.yaml
#   # edit deploy/my-secrets.yaml
#   helm upgrade --install drones charts/dronespredictions -f deploy/my-secrets.yaml

cloudflared:
  enabled: true
  # Paste the token you copied from Cloudflare Zero Trust >
  # Networks > Tunnels > (your tunnel) > Install connector.
  # It starts with "eyJhIjoi..." and is 400-600 chars long.
  token: "PASTE_CLOUDFLARE_TUNNEL_TOKEN_HERE"

config:
  # Update this to the public URL you set up in Cloudflare
  # (Zero Trust > Networks > Tunnels > Public Hostnames tab).
  BASE_URL: "https://drones.yourdomain.com"

# Enforce network policies (only effective on Calico/Cilium clusters,
# not stock kind — but harmless to leave on).
networkPolicy:
  enabled: true

# Optional: only fill these if you want them.
secrets:
  TELETHON_API_ID: ""
  TELETHON_API_HASH: ""
  ACLED_EMAIL: ""
  ACLED_PASSWORD: ""

# Optional: enable ingress if you also want a local-network URL
# (unrelated to Cloudflare — leave off if you only need public access).
ingress:
  enabled: false
